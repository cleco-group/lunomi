<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunomi KDS - Kitchen Display System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .order-card { transition: all 0.3s; }
        .order-card.urgent { border-left: 4px solid #ef4444; background: #fef2f2; }
        .order-card.ready { border-left: 4px solid #10b981; background: #f0fdf4; }
        .order-card.cooking { border-left: 4px solid #f59e0b; background: #fffbeb; }
        .timer { font-weight: 700; font-size: 1.25rem; }
        .timer.urgent { color: #ef4444; animation: pulse 1s infinite; }
        .timer.warning { color: #f59e0b; }
        .timer.ok { color: #10b981; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <!-- Header -->
    <div class="bg-gray-800 border-b border-gray-700 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">🍳 Kitchen Display System</h1>
                <p class="text-sm text-gray-400">Lunomi KDS - Outlet Jl. Sudirman</p>
            </div>
            <div class="text-right">
                <p class="text-sm text-gray-400" id="timeNow">--:--</p>
                <p class="text-xs text-gray-500">Status: <span id="kdsStatus" class="text-green-400">ONLINE</span></p>
            </div>
        </div>
    </div>

    <!-- Stats Bar -->
    <div class="bg-gray-800 border-b border-gray-700 px-6 py-3">
        <div class="max-w-7xl mx-auto flex gap-8 text-sm">
            <div class="flex items-center gap-2">
                <span class="text-gray-400">📋 Total Order:</span>
                <span class="font-bold text-lg" id="totalOrder">0</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-gray-400">👨‍🍳 Sedang Masak:</span>
                <span class="font-bold text-lg text-amber-400" id="cookingOrder">0</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-gray-400">✓ Selesai:</span>
                <span class="font-bold text-lg text-green-400" id="readyOrder">0</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-gray-400">🚨 Urgent:</span>
                <span class="font-bold text-lg text-red-400" id="urgentOrder">0</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-6 py-6 h-[calc(100vh-200px)] overflow-y-auto">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Incoming Orders -->
            <div>
                <h2 class="text-lg font-bold mb-4 text-yellow-400">📥 Order Masuk</h2>
                <div id="incomingOrders" class="space-y-4"></div>
            </div>

            <!-- Cooking Orders -->
            <div>
                <h2 class="text-lg font-bold mb-4 text-orange-400">👨‍🍳 Sedang Dimasak</h2>
                <div id="cookingOrders" class="space-y-4"></div>
            </div>

            <!-- Ready Orders -->
            <div>
                <h2 class="text-lg font-bold mb-4 text-green-400">✓ Siap Diambil</h2>
                <div id="readyOrders" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // Sample orders data
        const ORDERS = [
            {id:'ORD-001',time:'09:30',items:'Nasi Goreng x2, Mie Ayam',st:'pending',et:8,min:3},
            {id:'ORD-002',time:'09:32',items:'Ikan Bakar, Soto Ayam',st:'pending',et:12,min:5},
            {id:'ORD-003',time:'09:35',items:'Lumpia x3, Es Teh',st:'cooking',et:4,min:2},
            {id:'ORD-004',time:'09:38',items:'Kue Lapis x2, Kopi',st:'cooking',et:2,min:1},
            {id:'ORD-005',time:'09:40',items:'Roti Goreng x5',st:'ready',et:0,min:0},
            {id:'ORD-006',time:'09:42',items:'Nasi Goreng (URGENT)',st:'pending',et:6,min:2,urgent:true},
            {id:'ORD-007',time:'09:45',items:'Smoothie, Jus',st:'ready',et:0,min:0},
            {id:'ORD-008',time:'09:48',items:'Bika Ambon',st:'cooking',et:3,min:1}
        ];

        let orders = JSON.parse(JSON.stringify(ORDERS));
        let elapsed = {};

        function initElapsed() {
            orders.forEach(o => {
                elapsed[o.id] = 0;
            });
        }

        function tick() {
            orders.forEach(o => {
                if (o.st === 'cooking' || o.st === 'pending') {
                    elapsed[o.id] = (elapsed[o.id] || 0) + 1;
                }
            });
            render();
        }

        function render() {
            const incoming = orders.filter(o => o.st === 'pending');
            const cooking = orders.filter(o => o.st === 'cooking');
            const ready = orders.filter(o => o.st === 'ready');

            document.getElementById('incomingOrders').innerHTML = incoming.length === 0 
                ? '<p class="text-gray-500 text-sm">Tidak ada order baru</p>'
                : incoming.map(o => renderCard(o, 'pending')).join('');

            document.getElementById('cookingOrders').innerHTML = cooking.length === 0
                ? '<p class="text-gray-500 text-sm">Semua selesai</p>'
                : cooking.map(o => renderCard(o, 'cooking')).join('');

            document.getElementById('readyOrders').innerHTML = ready.length === 0
                ? '<p class="text-gray-500 text-sm">Belum ada yang siap</p>'
                : ready.map(o => renderCard(o, 'ready')).join('');

            document.getElementById('totalOrder').textContent = orders.length;
            document.getElementById('cookingOrder').textContent = cooking.length;
            document.getElementById('readyOrder').textContent = ready.length;
            document.getElementById('urgentOrder').textContent = orders.filter(o => o.urgent).length;
        }

        function renderCard(o, type) {
            const el = elapsed[o.id] || 0;
            const timerClass = o.urgent ? 'urgent' : el > 600 ? 'warning' : 'ok';
            const mins = Math.floor(el / 60);
            const secs = el % 60;
            const timerText = mins + ':' + (secs < 10 ? '0' : '') + secs;

            return '<div class="order-card ' + (o.urgent ? 'urgent' : type === 'cooking' ? 'cooking' : type === 'ready' ? 'ready' : '') + ' p-4 rounded-lg">' +
                '<div class="flex justify-between items-start mb-3">' +
                '<div>' +
                '<div class="font-bold text-lg">' + o.id + '</div>' +
                '<div class="text-xs text-gray-400">' + o.time + '</div>' +
                '</div>' +
                '<div class="text-right">' +
                '<div class="timer ' + timerClass + '">' + timerText + '</div>' +
                '<div class="text-xs text-gray-400">' + (type === 'ready' ? 'Siap' : 'Est: ' + o.et + 'min') + '</div>' +
                '</div></div>' +
                '<div class="text-sm mb-3 border-t border-gray-600 pt-2">' + o.items + '</div>' +
                '<div class="flex gap-2">' +
                (type === 'pending' ? 
                    '<button onclick="startCooking(\'' + o.id + '\')" class="flex-1 bg-orange-600 hover:bg-orange-700 px-3 py-2 rounded text-xs font-semibold">Mulai Masak</button>' :
                type === 'cooking' ?
                    '<button onclick="markReady(\'' + o.id + '\')" class="flex-1 bg-green-600 hover:bg-green-700 px-3 py-2 rounded text-xs font-semibold">Selesai</button>' :
                    '<button onclick="clearOrder(\'' + o.id + '\')" class="flex-1 bg-gray-700 hover:bg-gray-600 px-3 py-2 rounded text-xs font-semibold">Ambil</button>'
                ) +
                (o.urgent ? '<button onclick="toggleUrgent(\'' + o.id + '\')" class="flex-1 bg-red-700 hover:bg-red-800 px-3 py-2 rounded text-xs font-semibold">🚨</button>' : '') +
                '</div></div>';
        }

        function startCooking(id) {
            const o = orders.find(x => x.id === id);
            if (o) o.st = 'cooking';
            render();
        }

        function markReady(id) {
            const o = orders.find(x => x.id === id);
            if (o) o.st = 'ready';
            render();
        }

        function clearOrder(id) {
            orders = orders.filter(x => x.id !== id);
            render();
        }

        function toggleUrgent(id) {
            const o = orders.find(x => x.id === id);
            if (o) o.urgent = !o.urgent;
            render();
        }

        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('timeNow').textContent = h + ':' + m;
        }

        function checkSession() {
            const s = localStorage.getItem('lunomi_session');
            if (!s) { window.location.href = 'index.html'; return; }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkSession();
            initElapsed();
            render();
            updateTime();
            setInterval(updateTime, 1000);
            setInterval(tick, 1000);
        });
    </script>
</body>
</html>
