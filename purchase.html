<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunomi Purchase - Pembelian & Supplier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .tab-btn { transition: all 0.3s; }
        .po-item { transition: all 0.3s; }
        .po-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <div class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">🛒 Pembelian & Supplier</h1>
                    <p class="text-sm text-gray-500">Lunomi - Purchase Orders & Supplier Management</p>
                </div>
                <button onclick="logout()" class="text-gray-600 hover:text-gray-900 text-sm font-medium">Logout</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Tabs -->
        <div class="flex gap-4 mb-8 border-b border-gray-200">
            <button onclick="switchTab('po')" id="tab-po" class="tab-btn pb-4 px-4 border-b-2 border-blue-600 text-blue-600 font-semibold">
                📋 Purchase Order
            </button>
            <button onclick="switchTab('supplier')" id="tab-supplier" class="tab-btn pb-4 px-4 border-b-2 border-transparent text-gray-600 font-semibold hover:text-gray-900">
                🏢 Daftar Supplier
            </button>
            <button onclick="switchTab('receipt')" id="tab-receipt" class="tab-btn pb-4 px-4 border-b-2 border-transparent text-gray-600 font-semibold hover:text-gray-900">
                📦 Penerimaan Barang
            </button>
        </div>

        <!-- Tab: Purchase Order -->
        <div id="tab-po-content" class="space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-900">Daftar Purchase Order</h2>
                <button onclick="openCreatePO()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">
                    + Buat PO Baru
                </button>
            </div>

            <div id="poList" class="space-y-4"></div>
        </div>

        <!-- Tab: Supplier -->
        <div id="tab-supplier-content" style="display:none" class="space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-900">Daftar Supplier</h2>
                <button onclick="openAddSupplier()" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">
                    + Tambah Supplier
                </button>
            </div>

            <div id="supplierList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- Tab: Goods Receipt -->
        <div id="tab-receipt-content" style="display:none" class="space-y-6">
            <h2 class="text-lg font-bold text-gray-900">Penerimaan Barang</h2>
            <div id="receiptList" class="space-y-4"></div>
        </div>
    </div>

    <!-- Modal: Create PO -->
    <div id="poModal" style="display:none" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg p-6 max-w-2xl w-full max-h-screen overflow-y-auto">
            <h2 class="text-lg font-bold mb-6 text-gray-900">Buat Purchase Order Baru</h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Supplier</label>
                    <select id="poSupplier" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Pilih Supplier</option>
                        <option value="PT Maju Jaya">PT Maju Jaya</option>
                        <option value="CV Berkah Niaga">CV Berkah Niaga</option>
                        <option value="Toko Langganan">Toko Langganan</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Pilih Barang</label>
                    <div id="itemSelector" class="space-y-2"></div>
                </div>

                <div id="poItems" class="border border-gray-200 rounded-lg p-4 space-y-2">
                    <h3 class="font-semibold text-gray-900 mb-2">Item PO</h3>
                    <div id="poItemsList" class="text-sm text-gray-600">Tidak ada item</div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Tanggal PO</label>
                        <input type="date" id="poDate" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Target Penerimaan</label>
                        <input type="date" id="poDelivery" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="bg-blue-50 rounded-lg p-4">
                    <div class="flex justify-between items-center">
                        <span class="font-semibold text-gray-900">Total PO</span>
                        <span id="poTotal" class="text-2xl font-bold text-blue-600">Rp 0</span>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="closePOModal()" class="flex-1 border border-gray-300 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50">Batal</button>
                    <button onclick="submitPO()" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700">✓ Buat PO</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal: Add Supplier -->
    <div id="supplierModal" style="display:none" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg p-6 max-w-md w-full">
            <h2 class="text-lg font-bold mb-6 text-gray-900">Tambah Supplier</h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nama Supplier</label>
                    <input type="text" id="supplierName" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Misal: PT Maju Jaya">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" id="supplierEmail" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="email@supplier.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Telepon</label>
                    <input type="tel" id="supplierPhone" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="021-xxxx-xxxx">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Alamat</label>
                    <textarea id="supplierAddr" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Alamat lengkap" rows="2"></textarea>
                </div>

                <div class="flex gap-3">
                    <button onclick="closeSupplierModal()" class="flex-1 border border-gray-300 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-50">Batal</button>
                    <button onclick="saveSupplier()" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700">Tambah</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const POS = [
            {id:'PO-001',sup:'PT Maju Jaya',st:'pending',t:2500000,it:'Beras 25kg, Minyak 5L',d:'2026-05-05'},
            {id:'PO-002',sup:'CV Berkah',st:'received',t:1850000,it:'Daging 10kg, Ayam 8kg',d:'2026-05-03'},
            {id:'PO-003',sup:'Toko Langganan',st:'pending',t:980000,it:'Telur 30kg, Tahu 5kg',d:'2026-05-07'}
        ];

        const SUPPLIERS = [
            {n:'PT Maju Jaya',e:'info@majujaya.com',p:'021-1234567',a:'Jl. Gatot Subroto, Jakarta'},
            {n:'CV Berkah Niaga',e:'sales@berkah.com',p:'021-7654321',a:'Jl. Hayam Wuruk, Jakarta'},
            {n:'Toko Langganan',e:'toko@langganan.com',p:'021-9999999',a:'Pasar Blok A, Jakarta'}
        ];

        const ITEMS = [
            {n:'Beras 25kg',p:180000},{n:'Minyak 5L',p:65000},{n:'Daging 10kg',p:450000},
            {n:'Ayam 8kg',p:240000},{n:'Telur 30kg',p:320000},{n:'Tahu 5kg',p:45000}
        ];

        function switchTab(tab) {
            document.getElementById('tab-po-content').style.display = tab === 'po' ? 'block' : 'none';
            document.getElementById('tab-supplier-content').style.display = tab === 'supplier' ? 'block' : 'none';
            document.getElementById('tab-receipt-content').style.display = tab === 'receipt' ? 'block' : 'none';

            document.querySelectorAll('.tab-btn').forEach((b, i) => {
                const tabs = ['po', 'supplier', 'receipt'];
                if (tabs[i] === tab) {
                    b.classList.add('border-blue-600', 'text-blue-600');
                    b.classList.remove('border-transparent', 'text-gray-600');
                } else {
                    b.classList.remove('border-blue-600', 'text-blue-600');
                    b.classList.add('border-transparent', 'text-gray-600');
                }
            });

            if (tab === 'po') renderPOs();
            else if (tab === 'supplier') renderSuppliers();
            else if (tab === 'receipt') renderReceipts();
        }

        function renderPOs() {
            const html = document.getElementById('poList');
            html.innerHTML = POS.map(po =>
                '<div class="po-item bg-white rounded-lg shadow p-4 border-l-4 ' + (po.st === 'pending' ? 'border-yellow-500' : 'border-green-500') + '">' +
                '<div class="flex justify-between items-start mb-2">' +
                '<div><h3 class="font-bold text-gray-900">' + po.id + '</h3>' +
                '<p class="text-sm text-gray-600">' + po.sup + '</p></div>' +
                '<span class="px-3 py-1 rounded-full text-xs font-semibold ' + (po.st === 'pending' ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700') + '">' + po.st.toUpperCase() + '</span>' +
                '</div>' +
                '<p class="text-sm text-gray-600 mb-2">' + po.it + '</p>' +
                '<div class="flex justify-between items-center text-sm">' +
                '<span class="text-gray-600">Target Terima: ' + po.d + '</span>' +
                '<span class="font-bold">Rp ' + po.t.toLocaleString('id-ID') + '</span>' +
                '</div></div>'
            ).join('');
        }

        function renderSuppliers() {
            const html = document.getElementById('supplierList');
            html.innerHTML = SUPPLIERS.map(s =>
                '<div class="bg-white rounded-lg shadow p-4">' +
                '<h3 class="font-bold text-gray-900 mb-2">' + s.n + '</h3>' +
                '<div class="text-xs text-gray-600 space-y-1 mb-4">' +
                '<div>📧 ' + s.e + '</div>' +
                '<div>📱 ' + s.p + '</div>' +
                '<div>📍 ' + s.a + '</div>' +
                '</div>' +
                '<button class="w-full px-3 py-2 border border-blue-300 text-blue-600 rounded text-xs font-semibold hover:bg-blue-50">Edit</button>' +
                '</div>'
            ).join('');
        }

        function renderReceipts() {
            const html = document.getElementById('receiptList');
            html.innerHTML = POS.filter(p => p.st === 'received').map(po =>
                '<div class="bg-white rounded-lg shadow p-4 border-l-4 border-green-500">' +
                '<div class="flex justify-between items-start mb-2">' +
                '<div><h3 class="font-bold text-gray-900">' + po.id + ' - Penerimaan</h3>' +
                '<p class="text-sm text-gray-600">' + po.sup + '</p></div>' +
                '<span class="px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700">✓ Diterima</span>' +
                '</div>' +
                '<p class="text-sm text-gray-600 mb-2">' + po.it + '</p>' +
                '<button class="text-blue-600 text-sm font-semibold hover:text-blue-800">Lihat Detail →</button>' +
                '</div>'
            ).join('');
        }

        function openCreatePO() { document.getElementById('poModal').style.display = 'flex'; }
        function closePOModal() { document.getElementById('poModal').style.display = 'none'; }
        function openAddSupplier() { document.getElementById('supplierModal').style.display = 'flex'; }
        function closeSupplierModal() { document.getElementById('supplierModal').style.display = 'none'; }

        function submitPO() {
            alert('✓ PO berhasil dibuat');
            closePOModal();
            renderPOs();
        }

        function saveSupplier() {
            const n = document.getElementById('supplierName').value;
            if (!n) { alert('Nama supplier harus diisi'); return; }
            SUPPLIERS.push({n,e:document.getElementById('supplierEmail').value,p:document.getElementById('supplierPhone').value,a:document.getElementById('supplierAddr').value});
            renderSuppliers();
            closeSupplierModal();
            alert('✓ Supplier berhasil ditambahkan');
        }

        function logout() {
            localStorage.removeItem('lunomi_session');
            window.location.href = 'index.html';
        }

        function checkSession() {
            const s = localStorage.getItem('lunomi_session');
            if (!s) { window.location.href = 'index.html'; return; }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkSession();
            renderPOs();
        });
    </script>
</body>
</html>
