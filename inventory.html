<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunomi Inventory - Manajemen Stok</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .stock-item { transition: all 0.3s; }
        .stock-item.alert { border-left: 4px solid #ef4444; background: #fef2f2; }
        .stock-item.warning { border-left: 4px solid #f59e0b; background: #fffbeb; }
        .stock-item.normal { border-left: 4px solid #10b981; background: #f0fdf4; }
        .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
        .badge.red { background: #fecaca; color: #991b1b; }
        .badge.orange { background: #fed7aa; color: #92400e; }
        .badge.green { background: #bbf7d0; color: #065f46; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <div class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">📦 Inventory Management</h1>
                    <p class="text-sm text-gray-500">Lunomi - Manajemen Stok Bahan Baku</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="openAddStock()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-semibold">
                        + Tambah Stok
                    </button>
                    <button onclick="logout()" class="text-gray-600 hover:text-gray-900 text-sm font-medium">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Bar -->
    <div class="bg-white border-b border-gray-200 px-4 sm:px-6 lg:px-8 py-4">
        <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
            <div>
                <p class="text-gray-600">Total Item</p>
                <p class="text-2xl font-bold text-gray-900" id="totalItems">0</p>
            </div>
            <div>
                <p class="text-gray-600">Stock Alert 🚨</p>
                <p class="text-2xl font-bold text-red-600" id="alertItems">0</p>
            </div>
            <div>
                <p class="text-gray-600">Warning ⚠️</p>
                <p class="text-2xl font-bold text-orange-600" id="warningItems">0</p>
            </div>
            <div>
                <p class="text-gray-600">Stock OK ✓</p>
                <p class="text-2xl font-bold text-green-600" id="okItems">0</p>
            </div>
        </div>
    </div>

    <!-- Filters & Search -->
    <div class="bg-white border-b border-gray-200 px-4 sm:px-6 lg:px-8 py-4">
        <div class="max-w-7xl mx-auto flex gap-3 flex-wrap">
            <input type="text" id="searchInput" placeholder="Cari item..." class="flex-1 min-w-48 px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onkeyup="filterInventory()">
            <select id="categoryFilter" class="px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="filterInventory()">
                <option value="">Semua Kategori</option>
                <option value="bahan">Bahan Baku</option>
                <option value="bumbu">Bumbu</option>
                <option value="minuman">Minuman</option>
                <option value="packaging">Packaging</option>
            </select>
            <select id="statusFilter" class="px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="filterInventory()">
                <option value="">Semua Status</option>
                <option value="alert">Alert</option>
                <option value="warning">Warning</option>
                <option value="ok">OK</option>
            </select>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="inventoryList" class="space-y-4"></div>
    </div>

    <!-- Modal Tambah Stok -->
    <div id="addStockModal" style="display:none" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg p-6 max-w-md w-full">
            <h2 class="text-lg font-bold mb-4">Tambah Stok Item</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">Nama Item</label>
                    <input type="text" id="itemName" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Misal: Daging Ayam">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Kategori</label>
                    <select id="itemCategory" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="bahan">Bahan Baku</option>
                        <option value="bumbu">Bumbu</option>
                        <option value="minuman">Minuman</option>
                        <option value="packaging">Packaging</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Jumlah</label>
                    <input type="number" id="itemQty" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0" min="0">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Satuan</label>
                    <select id="itemUnit" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="kg">kg</option>
                        <option value="liter">Liter</option>
                        <option value="pcs">Pcs</option>
                        <option value="box">Box</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Minimum Stock</label>
                    <input type="number" id="itemMin" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0" min="0">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Supplier</label>
                    <input type="text" id="itemSupplier" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Misal: PT Maju Jaya">
                </div>
                <div class="flex gap-3">
                    <button onclick="closeAddStock()" class="flex-1 border border-gray-300 px-4 py-2 rounded text-sm font-semibold hover:bg-gray-50">Batal</button>
                    <button onclick="saveStock()" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded text-sm font-semibold hover:bg-blue-700">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sample inventory data
        const INV = [
            {id:1,n:'Daging Ayam',c:'bahan',q:25,u:'kg',min:20,s:'PT Maju Jaya',upd:'2026-05-01'},
            {id:2,n:'Beras Premium',c:'bahan',q:15,u:'kg',min:30,s:'PT Beras Emas',upd:'2026-04-30'},
            {id:3,n:'Minyak Goreng',c:'bahan',q:8,u:'liter',min:10,s:'PT Samin',upd:'2026-04-29'},
            {id:4,n:'Garam Halus',c:'bumbu',q:5,u:'kg',min:3,s:'PT Garam',upd:'2026-05-01'},
            {id:5,n:'Lada Hitam',c:'bumbu',q:2,u:'kg',min:1.5,s:'PT Rempah',upd:'2026-04-28'},
            {id:6,n:'Air Mineral',c:'minuman',q:50,u:'box',min:40,s:'PT Aqua',upd:'2026-05-01'},
            {id:7,n:'Kopi Arabika',c:'bumbu',q:3,u:'kg',min:5,s:'PT Kopi',upd:'2026-04-27'},
            {id:8,n:'Plastik Makan',c:'packaging',q:500,u:'pcs',min:1000,s:'PT Plastik',upd:'2026-04-30'}
        ];

        let inv = JSON.parse(JSON.stringify(INV));

        function getStatus(q, min) {
            if (q <= min * 0.5) return 'alert';
            if (q <= min) return 'warning';
            return 'ok';
        }

        function render() {
            const list = document.getElementById('inventoryList');
            const items = inv.filter(i => {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const cat = document.getElementById('categoryFilter').value;
                const stat = document.getElementById('statusFilter').value;
                const itemStat = getStatus(i.q, i.min);
                
                return (i.n.toLowerCase().includes(search) || i.s.toLowerCase().includes(search)) &&
                       (!cat || i.c === cat) &&
                       (!stat || itemStat === stat);
            });

            list.innerHTML = items.map(i => {
                const st = getStatus(i.q, i.min);
                const pct = Math.round((i.q / i.min) * 100);
                return '<div class="stock-item ' + st + ' p-6 rounded-lg">' +
                    '<div class="flex justify-between items-start mb-4">' +
                    '<div><div class="font-bold text-lg">' + i.n + '</div>' +
                    '<div class="text-sm text-gray-600">' + i.c.charAt(0).toUpperCase() + i.c.slice(1) + ' | ' + i.s + '</div></div>' +
                    '<span class="badge ' + (st === 'alert' ? 'red' : st === 'warning' ? 'orange' : 'green') + '">' +
                    (st === 'alert' ? '🚨 ALERT' : st === 'warning' ? '⚠️ WARNING' : '✓ OK') + '</span></div>' +
                    '<div class="mb-4"><div class="flex justify-between text-sm mb-2">' +
                    '<span>' + i.q + ' ' + i.u + ' / Min: ' + i.min + ' ' + i.u + '</span>' +
                    '<span class="font-semibold">' + pct + '%</span></div>' +
                    '<div class="w-full bg-gray-300 rounded h-2"><div class="bg-' + (st === 'alert' ? 'red' : st === 'warning' ? 'amber' : 'green') + '-500 h-2 rounded" style="width:' + Math.min(pct, 100) + '%"></div></div></div>' +
                    '<div class="flex gap-2 text-xs text-gray-500 mb-3">Updated: ' + i.upd + '</div>' +
                    '<div class="flex gap-2">' +
                    '<button onclick="addQty(' + i.id + ')" class="flex-1 bg-green-600 text-white px-3 py-2 rounded text-sm font-semibold hover:bg-green-700">+ Masuk</button>' +
                    '<button onclick="minusQty(' + i.id + ')" class="flex-1 bg-orange-600 text-white px-3 py-2 rounded text-sm font-semibold hover:bg-orange-700">- Keluar</button>' +
                    '<button onclick="deleteItem(' + i.id + ')" class="flex-1 bg-red-600 text-white px-3 py-2 rounded text-sm font-semibold hover:bg-red-700">Hapus</button>' +
                    '</div></div>';
            }).join('');

            updateStats();
        }

        function updateStats() {
            const alert = inv.filter(i => getStatus(i.q, i.min) === 'alert').length;
            const warning = inv.filter(i => getStatus(i.q, i.min) === 'warning').length;
            const ok = inv.filter(i => getStatus(i.q, i.min) === 'ok').length;
            document.getElementById('totalItems').textContent = inv.length;
            document.getElementById('alertItems').textContent = alert;
            document.getElementById('warningItems').textContent = warning;
            document.getElementById('okItems').textContent = ok;
        }

        function filterInventory() {
            render();
        }

        function openAddStock() {
            document.getElementById('addStockModal').style.display = 'flex';
        }

        function closeAddStock() {
            document.getElementById('addStockModal').style.display = 'none';
            document.getElementById('itemName').value = '';
            document.getElementById('itemQty').value = '';
            document.getElementById('itemMin').value = '';
            document.getElementById('itemSupplier').value = '';
        }

        function saveStock() {
            const n = document.getElementById('itemName').value;
            const c = document.getElementById('itemCategory').value;
            const q = parseFloat(document.getElementById('itemQty').value) || 0;
            const u = document.getElementById('itemUnit').value;
            const min = parseFloat(document.getElementById('itemMin').value) || 0;
            const s = document.getElementById('itemSupplier').value;

            if (!n || q < 0 || min < 0) {
                alert('Isi semua field dengan benar');
                return;
            }

            const id = Math.max(...inv.map(i => i.id), 0) + 1;
            inv.push({id,n,c,q,u,min,s,upd:new Date().toISOString().split('T')[0]});
            render();
            closeAddStock();
            alert('✓ Item ditambahkan');
        }

        function addQty(id) {
            const i = inv.find(x => x.id === id);
            if (i) {
                const add = prompt('Tambah berapa ' + i.u + '?', '1');
                if (add && !isNaN(add)) {
                    i.q += parseFloat(add);
                    i.upd = new Date().toISOString().split('T')[0];
                    render();
                }
            }
        }

        function minusQty(id) {
            const i = inv.find(x => x.id === id);
            if (i) {
                const minus = prompt('Kurang berapa ' + i.u + '?', '1');
                if (minus && !isNaN(minus)) {
                    i.q = Math.max(0, i.q - parseFloat(minus));
                    i.upd = new Date().toISOString().split('T')[0];
                    render();
                }
            }
        }

        function deleteItem(id) {
            if (confirm('Hapus item ini?')) {
                inv = inv.filter(x => x.id !== id);
                render();
            }
        }

        function logout() {
            localStorage.removeItem('lunomi_session');
            window.location.href = 'index.html';
        }

        function checkSession() {
            const s = localStorage.getItem('lunomi_session');
            if (!s) { window.location.href = 'index.html'; return; }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkSession();
            render();
        });
    </script>
</body>
</html>
