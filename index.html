<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunomi POS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            min-height: 100vh;
            background: #020617;
            background-image:
                radial-gradient(ellipse 80% 60% at 20% 0%, rgba(99,102,241,0.35) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 100%, rgba(59,130,246,0.3) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(139,92,246,0.15) 0%, transparent 70%);
            overflow: hidden;
        }

        /* Glassmorphism — from UI/UX Pro Max skill */
        .glass {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .glass-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            animation: drift 12s ease-in-out infinite;
        }
        .orb-1 { width:500px;height:500px;background:rgba(99,102,241,0.25);top:-200px;right:-150px;animation-delay:0s; }
        .orb-2 { width:400px;height:400px;background:rgba(59,130,246,0.2);bottom:-150px;left:-100px;animation-delay:3s; }
        .orb-3 { width:300px;height:300px;background:rgba(139,92,246,0.2);top:40%;left:30%;animation-delay:6s; }

        @keyframes drift {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(30px,-20px) scale(1.05); }
            66% { transform: translate(-20px,15px) scale(0.97); }
        }

        /* Input */
        .input-glass {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            transition: all 0.2s;
        }
        .input-glass::placeholder { color: rgba(255,255,255,0.35); }
        .input-glass:focus {
            outline: none;
            border-color: rgba(99,102,241,0.7);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
        }

        /* Role card */
        .role-card {
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-card:hover { background: rgba(255,255,255,0.1); color: white; }
        input[type="radio"]:checked + .role-card {
            background: rgba(99,102,241,0.25);
            border-color: rgba(99,102,241,0.7);
            color: white;
            box-shadow: 0 0 12px rgba(99,102,241,0.3);
        }

        /* Button */
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.5); }
        .btn-primary:disabled { opacity: 0.55; transform: none; cursor: not-allowed; }

        /* Error */
        .error-glass {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }

        /* Spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px; }

        /* Demo box */
        .demo-glass {
            background: rgba(255,193,7,0.08);
            border: 1px solid rgba(255,193,7,0.2);
            color: rgba(255,220,100,0.85);
        }

        label { display:block; }
    </style>
</head>
<body class="relative">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="min-h-screen flex items-center justify-center p-4 relative z-10">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="text-center mb-6">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl glass mb-4 shadow-lg">
                    <span class="text-3xl">🏪</span>
                </div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">Lunomi POS</h1>
                <p class="text-sm mt-1" style="color:rgba(255,255,255,0.45)">Sistem POS Pintar untuk F&B Indonesia</p>
            </div>

            <!-- STEP 1: Login Card -->
            <div id="step-login" class="glass rounded-3xl p-7 shadow-2xl">
                <!-- Error -->
                <div id="errorMsg" class="hidden mb-4 px-4 py-3 rounded-xl error-glass flex items-center gap-2 text-sm">
                    <span>⚠️</span><span id="errorText"></span>
                </div>

                <!-- Role -->
                <div class="mb-5">
                    <p class="text-xs font-semibold mb-3 uppercase tracking-widest" style="color:rgba(255,255,255,0.4)">Pilih Role Akses</p>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                        <label><input type="radio" name="role" value="owner" class="hidden" checked onchange="updateRole()">
                            <div class="role-card p-3 rounded-xl text-center">
                                <div class="text-xl mb-1">👤</div>
                                <div class="text-xs font-semibold">Owner</div>
                            </div>
                        </label>
                        <label><input type="radio" name="role" value="manager" class="hidden" onchange="updateRole()">
                            <div class="role-card p-3 rounded-xl text-center">
                                <div class="text-xl mb-1">📋</div>
                                <div class="text-xs font-semibold">Manager</div>
                            </div>
                        </label>
                        <label><input type="radio" name="role" value="cashier" class="hidden" onchange="updateRole()">
                            <div class="role-card p-3 rounded-xl text-center">
                                <div class="text-xl mb-1">💳</div>
                                <div class="text-xs font-semibold">Kasir</div>
                            </div>
                        </label>
                        <label><input type="radio" name="role" value="kitchen" class="hidden" onchange="updateRole()">
                            <div class="role-card p-3 rounded-xl text-center">
                                <div class="text-xl mb-1">👨‍🍳</div>
                                <div class="text-xs font-semibold">Kitchen</div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="text-xs font-semibold mb-1.5" style="color:rgba(255,255,255,0.5)">Email</label>
                    <input id="email" type="email" placeholder="staff@lunomi.local"
                        class="input-glass w-full px-4 py-3 rounded-xl text-sm" oninput="clearError()">
                </div>

                <!-- Password -->
                <div class="mb-5">
                    <label class="text-xs font-semibold mb-1.5" style="color:rgba(255,255,255,0.5)">Password</label>
                    <div class="relative">
                        <input id="password" type="password" placeholder="••••••••"
                            class="input-glass w-full px-4 py-3 pr-12 rounded-xl text-sm" oninput="clearError()">
                        <button type="button" onclick="togglePassword()" id="eyeBtn"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-base opacity-50 hover:opacity-90 transition">👁️</button>
                    </div>
                </div>

                <!-- Submit -->
                <button id="loginBtn" onclick="handleLogin()"
                    class="btn-primary w-full py-3 rounded-xl text-sm mb-4">
                    Masuk ke Lunomi
                </button>

                <!-- Demo info -->
                <div class="demo-glass rounded-xl p-3 text-xs">
                    <div class="font-semibold mb-1.5 opacity-70">Akun Demo — klik role untuk auto-isi</div>
                    <div class="space-y-0.5 opacity-70">
                        <div>👤 owner@lunomi.local · demo123</div>
                        <div>📋 manager@lunomi.local · demo123</div>
                        <div>💳 kasir@lunomi.local · demo123</div>
                        <div>👨‍🍳 kitchen@lunomi.local · demo123</div>
                    </div>
                </div>
            </div>

            <!-- STEP 2: Outlet Selector (owner only) -->
            <div id="step-outlet" class="hidden glass rounded-3xl p-7 shadow-2xl">
                <div class="flex items-center gap-3 mb-5">
                    <button onclick="backToLogin()" class="text-white opacity-50 hover:opacity-100 transition text-lg">←</button>
                    <div>
                        <p class="text-xs font-semibold uppercase tracking-widest" style="color:rgba(255,255,255,0.4)">Pilih Outlet</p>
                        <p class="text-white font-bold text-base" id="outletGreet">Selamat datang, Owner</p>
                    </div>
                </div>
                <div class="space-y-3" id="outletList">
                    <button onclick="selectOutlet('outlet_cleco_pii','Cleco Pii')"
                        class="w-full text-left glass-card p-4 rounded-2xl hover:border-indigo-500 transition group" style="border:1.5px solid rgba(255,255,255,0.1)">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl" style="background:rgba(99,102,241,0.2)">🏪</div>
                            <div class="flex-1">
                                <div class="font-semibold text-white text-sm">Cleco Pii</div>
                                <div class="text-xs mt-0.5" style="color:rgba(255,255,255,0.4)">Jl. Sudirman No. 12 · Online</div>
                            </div>
                            <div class="text-indigo-400 opacity-0 group-hover:opacity-100 transition">→</div>
                        </div>
                    </button>
                    <button onclick="selectOutlet('outlet_resep_bunce','Resep Bunce')"
                        class="w-full text-left glass-card p-4 rounded-2xl hover:border-indigo-500 transition group" style="border:1.5px solid rgba(255,255,255,0.1)">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl" style="background:rgba(245,158,11,0.2)">🍳</div>
                            <div class="flex-1">
                                <div class="font-semibold text-white text-sm">Resep Bunce</div>
                                <div class="text-xs mt-0.5" style="color:rgba(255,255,255,0.4)">Jl. Gatot Subroto No. 5 · Online</div>
                            </div>
                            <div class="text-indigo-400 opacity-0 group-hover:opacity-100 transition">→</div>
                        </div>
                    </button>
                    <button onclick="selectOutlet('outlet_baby_joy','Baby Joy')"
                        class="w-full text-left glass-card p-4 rounded-2xl hover:border-indigo-500 transition group" style="border:1.5px solid rgba(255,255,255,0.1)">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl" style="background:rgba(236,72,153,0.2)">🍼</div>
                            <div class="flex-1">
                                <div class="font-semibold text-white text-sm">Baby Joy</div>
                                <div class="text-xs mt-0.5" style="color:rgba(255,255,255,0.4)">Jl. Thamrin No. 8 · Online</div>
                            </div>
                            <div class="text-indigo-400 opacity-0 group-hover:opacity-100 transition">→</div>
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DEMO_ACCOUNTS = {
            owner:   { email:'owner@lunomi.local',   password:'demo123' },
            manager: { email:'manager@lunomi.local',  password:'demo123' },
            cashier: { email:'kasir@lunomi.local',    password:'demo123' },
            kitchen: { email:'kitchen@lunomi.local',  password:'demo123' }
        };
        const DEFAULT_OUTLETS = {
            manager: { id:'outlet_resep_bunce', name:'Resep Bunce' },
            cashier:  { id:'outlet_cleco_pii',   name:'Cleco Pii' },
            kitchen:  { id:'outlet_cleco_pii',   name:'Cleco Pii' }
        };
        const DASHBOARDS = {
            owner:'dashboard.html', manager:'dashboard.html',
            cashier:'pos.html', kitchen:'kitchen.html'
        };

        let errorTimer = null, pendingSession = null;

        function updateRole() {
            const role = document.querySelector('input[name="role"]:checked').value;
            const acc = DEMO_ACCOUNTS[role];
            document.getElementById('email').value    = acc.email;
            document.getElementById('password').value = acc.password;
            clearError();
        }

        function showError(msg) {
            clearTimeout(errorTimer);
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMsg').classList.remove('hidden');
            errorTimer = setTimeout(clearError, 5000);
        }
        function clearError() {
            clearTimeout(errorTimer);
            document.getElementById('errorMsg').classList.add('hidden');
        }

        function togglePassword() {
            const pw  = document.getElementById('password');
            const btn = document.getElementById('eyeBtn');
            pw.type   = pw.type === 'password' ? 'text' : 'password';
            btn.textContent = pw.type === 'password' ? '👁️' : '🙈';
        }

        function handleLogin() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role     = document.querySelector('input[name="role"]:checked').value;
            const btn      = document.getElementById('loginBtn');

            if (!email || !password) { showError('Email dan password harus diisi'); return; }

            const acc = DEMO_ACCOUNTS[role];
            if (email !== acc.email || password !== acc.password) {
                showError('Email atau password salah. Gunakan akun demo yang tersedia.');
                return;
            }

            const displayName = role === 'cashier' ? 'Kasir' : role.charAt(0).toUpperCase() + role.slice(1);
            pendingSession = {
                user: { email, id:`user_${role}_${Date.now()}`, role, name: displayName },
                loginTime: new Date().toISOString()
            };

            if (role === 'owner') {
                // Owner: show outlet selector
                document.getElementById('outletGreet').textContent = `Selamat datang, ${displayName}`;
                document.getElementById('step-login').classList.add('hidden');
                document.getElementById('step-outlet').classList.remove('hidden');
            } else {
                // Non-owner: auto-assign default outlet, redirect
                const outlet = DEFAULT_OUTLETS[role];
                pendingSession.outlet_id   = outlet.id;
                pendingSession.outlet_name = outlet.name;
                localStorage.setItem('lunomi_session', JSON.stringify(pendingSession));
                localStorage.setItem('lunomi_outlet', JSON.stringify(outlet));
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>Membuka...';
                setTimeout(() => { window.location.href = DASHBOARDS[role]; }, 600);
            }
        }

        function selectOutlet(id, name) {
            if (!pendingSession) return;
            pendingSession.outlet_id   = id;
            pendingSession.outlet_name = name;
            localStorage.setItem('lunomi_session', JSON.stringify(pendingSession));
            localStorage.setItem('lunomi_outlet', JSON.stringify({ id, name }));
            window.location.href = `dashboard.html?outlet=${id}`;
        }

        function backToLogin() {
            pendingSession = null;
            document.getElementById('step-outlet').classList.add('hidden');
            document.getElementById('step-login').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateRole();
            document.getElementById('password').addEventListener('keypress', e => {
                if (e.key === 'Enter') handleLogin();
            });
        });

        window.addEventListener('load', () => {
            try {
                const s = localStorage.getItem('lunomi_session');
                if (s) {
                    const d = JSON.parse(s);
                    if (DASHBOARDS[d.user.role]) window.location.href = DASHBOARDS[d.user.role];
                }
            } catch(e) {
                localStorage.removeItem('lunomi_session');
                localStorage.removeItem('lunomi_outlet');
            }
        });
    </script>
</body>
</html>
