<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunomi Outlet - Manajemen Outlet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .outlet-card { transition: all 0.3s; }
        .outlet-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
        .status-online { background: #d1fae5; color: #065f46; }
        .status-offline { background: #fee2e2; color: #991b1b; }
        .status-maintenance { background: #fef3c7; color: #78350f; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <div class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">🏪 Outlet Management</h1>
                    <p class="text-sm text-gray-500">Lunomi - Kelola Semua Outlet</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="openAddOutlet()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-semibold">
                        + Tambah Outlet
                    </button>
                    <button onclick="logout()" class="text-gray-600 hover:text-gray-900 text-sm font-medium">Logout</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Bar -->
    <div class="bg-white border-b border-gray-200 px-4 sm:px-6 lg:px-8 py-4">
        <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
            <div>
                <p class="text-gray-600">Total Outlet</p>
                <p class="text-2xl font-bold text-gray-900" id="totalOutlet">0</p>
            </div>
            <div>
                <p class="text-gray-600">🟢 Online</p>
                <p class="text-2xl font-bold text-green-600" id="onlineOutlet">0</p>
            </div>
            <div>
                <p class="text-gray-600">🔴 Offline</p>
                <p class="text-2xl font-bold text-red-600" id="offlineOutlet">0</p>
            </div>
            <div>
                <p class="text-gray-600">💰 Total Revenue</p>
                <p class="text-2xl font-bold text-blue-600" id="totalRevenue">Rp 0</p>
            </div>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white border-b border-gray-200 px-4 sm:px-6 lg:px-8 py-4">
        <div class="max-w-7xl mx-auto flex gap-3 flex-wrap">
            <input type="text" id="searchOutlet" placeholder="Cari outlet..." class="flex-1 min-w-48 px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onkeyup="filterOutlets()">
            <select id="statusFilter" class="px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="filterOutlets()">
                <option value="">Semua Status</option>
                <option value="online">Online</option>
                <option value="offline">Offline</option>
                <option value="maintenance">Maintenance</option>
            </select>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="outletList"></div>
    </div>

    <!-- Modal Tambah Outlet -->
    <div id="addOutletModal" style="display:none" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg p-6 max-w-md w-full">
            <h2 class="text-lg font-bold mb-4">Tambah Outlet Baru</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">Nama Outlet</label>
                    <input type="text" id="outletName" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Misal: Outlet Jl. Sudirman">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Alamat</label>
                    <textarea id="outletAddress" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Alamat lengkap" rows="3"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Kota</label>
                    <input type="text" id="outletCity" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Jakarta">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Nomor Telepon</label>
                    <input type="tel" id="outletPhone" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="021-XXXX-XXXX">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Manager</label>
                    <input type="text" id="outletManager" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Nama manager">
                </div>
                <div class="flex gap-3">
                    <button onclick="closeAddOutlet()" class="flex-1 border border-gray-300 px-4 py-2 rounded text-sm font-semibold hover:bg-gray-50">Batal</button>
                    <button onclick="saveOutlet()" class="flex-1 bg-blue-600 text-white px-4 py-2 rounded text-sm font-semibold hover:bg-blue-700">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detail Outlet -->
    <div id="detailOutletModal" style="display:none" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-lg p-6 max-w-md w-full max-h-screen overflow-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Detail Outlet</h2>
                <button onclick="closeDetailOutlet()" class="text-gray-500 hover:text-gray-700 font-bold text-xl">×</button>
            </div>
            <div id="outletDetails" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // Sample data
        const OUT = [
            {id:1,n:'Outlet Jl. Sudirman',a:'Jl. Jendral Sudirman No. 123, Jakarta Pusat',c:'Jakarta',p:'021-7777-7777',m:'Ahmad',st:'online',rev:45200000,emp:12,ord:128,rat:4.8},
            {id:2,n:'Outlet Senayan',a:'Jl. Gerbang Senayan No. 45, Jakarta Selatan',c:'Jakarta',p:'021-8888-8888',m:'Siti',st:'online',rev:38500000,emp:10,ord:105,rat:4.6},
            {id:3,n:'Outlet Blok M',a:'Jl. Melawai No. 78, Jakarta Selatan',c:'Jakarta',p:'021-9999-9999',m:'Budi',st:'offline',rev:22300000,emp:8,ord:64,rat:4.2},
            {id:4,n:'Outlet Kemang',a:'Jl. Kemang Raya No. 56, Jakarta Selatan',c:'Jakarta',p:'021-5555-5555',m:'Rina',st:'online',rev:35800000,emp:9,ord:98,rat:4.5},
            {id:5,n:'Outlet Menteng',a:'Jl. Menteng Atas No. 34, Jakarta Pusat',c:'Jakarta',p:'021-6666-6666',m:'Hendra',st:'maintenance',rev:18900000,emp:7,ord:52,rat:4.3},
            {id:6,n:'Outlet Thamrin',a:'Jl. M.H. Thamrin No. 12, Jakarta Pusat',c:'Jakarta',p:'021-3333-3333',m:'Dewi',st:'online',rev:42100000,emp:11,ord:115,rat:4.7},
            {id:7,n:'Outlet Gatot Subroto',a:'Jl. Gatot Subroto No. 90, Jakarta Selatan',c:'Jakarta',p:'021-4444-4444',m:'Yanto',st:'online',rev:39600000,emp:10,ord:110,rat:4.4},
            {id:8,n:'Outlet Cikini',a:'Jl. Cikini Raya No. 23, Jakarta Pusat',c:'Jakarta',p:'021-2222-2222',m:'Lisa',st:'online',rev:41700000,emp:11,ord:118,rat:4.6}
        ];

        let outlets = JSON.parse(JSON.stringify(OUT));

        function render() {
            const list = document.getElementById('outletList');
            const search = document.getElementById('searchOutlet').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            const filtered = outlets.filter(o => 
                (o.n.toLowerCase().includes(search) || o.a.toLowerCase().includes(search)) &&
                (!status || o.st === status)
            );

            list.innerHTML = filtered.map(o =>
                '<div class="outlet-card bg-white rounded-lg shadow p-6 border-l-4 border-' + (o.st === 'online' ? 'green' : o.st === 'offline' ? 'red' : 'yellow') + '-500">' +
                '<div class="flex justify-between items-start mb-4">' +
                '<div><div class="font-bold text-lg">' + o.n + '</div>' +
                '<div class="text-sm text-gray-600">' + o.c + '</div></div>' +
                '<span class="px-3 py-1 rounded-full text-xs font-semibold ' + 
                (o.st === 'online' ? 'status-online' : o.st === 'offline' ? 'status-offline' : 'status-maintenance') + '">' +
                (o.st === 'online' ? '🟢 Online' : o.st === 'offline' ? '🔴 Offline' : '🟡 Maintenance') + '</span></div>' +
                '<div class="grid grid-cols-2 gap-4 mb-4 text-sm'><div><p class="text-gray-600">Revenue</p><p class="font-bold">Rp ' + (o.rev/1000000).toFixed(1) + 'M</p></div>' +
                '<div><p class="text-gray-600">Karyawan</p><p class="font-bold">' + o.emp + ' orang</p></div>' +
                '<div><p class="text-gray-600">Order</p><p class="font-bold">' + o.ord + '</p></div>' +
                '<div><p class="text-gray-600">Rating</p><p class="font-bold">⭐ ' + o.rat + '</p></div></div>' +
                '<div class="flex gap-2">' +
                '<button onclick="viewDetail(' + o.id + ')" class="flex-1 text-blue-600 border border-blue-600 px-3 py-2 rounded text-xs font-semibold hover:bg-blue-50">Detail</button>' +
                '<button onclick="editOutlet(' + o.id + ')" class="flex-1 text-gray-600 border border-gray-300 px-3 py-2 rounded text-xs font-semibold hover:bg-gray-50">Edit</button>' +
                '</div></div>'
            ).join('');

            updateStats();
        }

        function updateStats() {
            const online = outlets.filter(o => o.st === 'online').length;
            const offline = outlets.filter(o => o.st === 'offline').length;
            const totalRev = outlets.reduce((s, o) => s + o.rev, 0);

            document.getElementById('totalOutlet').textContent = outlets.length;
            document.getElementById('onlineOutlet').textContent = online;
            document.getElementById('offlineOutlet').textContent = offline;
            document.getElementById('totalRevenue').textContent = 'Rp ' + (totalRev/1000000).toFixed(1) + 'M';
        }

        function filterOutlets() {
            render();
        }

        function openAddOutlet() {
            document.getElementById('addOutletModal').style.display = 'flex';
        }

        function closeAddOutlet() {
            document.getElementById('addOutletModal').style.display = 'none';
            document.getElementById('outletName').value = '';
            document.getElementById('outletAddress').value = '';
            document.getElementById('outletCity').value = '';
            document.getElementById('outletPhone').value = '';
            document.getElementById('outletManager').value = '';
        }

        function saveOutlet() {
            const n = document.getElementById('outletName').value;
            const a = document.getElementById('outletAddress').value;
            const c = document.getElementById('outletCity').value;
            const p = document.getElementById('outletPhone').value;
            const m = document.getElementById('outletManager').value;

            if (!n || !a || !c) {
                alert('Isi semua field yang wajib');
                return;
            }

            const id = Math.max(...outlets.map(o => o.id), 0) + 1;
            outlets.push({id,n,a,c,p,m,st:'online',rev:0,emp:0,ord:0,rat:0});
            render();
            closeAddOutlet();
            alert('✓ Outlet ditambahkan');
        }

        function viewDetail(id) {
            const o = outlets.find(x => x.id === id);
            if (o) {
                const details = document.getElementById('outletDetails');
                details.innerHTML = 
                    '<div class="space-y-4">' +
                    '<div class="p-4 bg-gray-50 rounded-lg">' +
                    '<p class="text-sm text-gray-600 mb-1">Nama Outlet</p>' +
                    '<p class="font-bold">' + o.n + '</p></div>' +
                    '<div class="p-4 bg-gray-50 rounded-lg">' +
                    '<p class="text-sm text-gray-600 mb-1">Alamat</p>' +
                    '<p class="font-bold">' + o.a + '</p></div>' +
                    '<div class="p-4 bg-gray-50 rounded-lg">' +
                    '<p class="text-sm text-gray-600 mb-1">Kota</p>' +
                    '<p class="font-bold">' + o.c + '</p></div>' +
                    '<div class="p-4 bg-gray-50 rounded-lg">' +
                    '<p class="text-sm text-gray-600 mb-1">Telepon</p>' +
                    '<p class="font-bold">' + o.p + '</p></div>' +
                    '<div class="p-4 bg-gray-50 rounded-lg">' +
                    '<p class="text-sm text-gray-600 mb-1">Manager</p>' +
                    '<p class="font-bold">' + o.m + '</p></div>' +
                    '<div class="grid grid-cols-2 gap-4">' +
                    '<div class="p-4 bg-blue-50 rounded-lg"><p class="text-xs text-gray-600">Revenue</p><p class="text-lg font-bold text-blue-600">Rp ' + (o.rev/1000000).toFixed(1) + 'M</p></div>' +
                    '<div class="p-4 bg-green-50 rounded-lg"><p class="text-xs text-gray-600">Karyawan</p><p class="text-lg font-bold text-green-600">' + o.emp + '</p></div>' +
                    '<div class="p-4 bg-purple-50 rounded-lg"><p class="text-xs text-gray-600">Order</p><p class="text-lg font-bold text-purple-600">' + o.ord + '</p></div>' +
                    '<div class="p-4 bg-yellow-50 rounded-lg"><p class="text-xs text-gray-600">Rating</p><p class="text-lg font-bold text-yellow-600">⭐ ' + o.rat + '</p></div>' +
                    '</div>' +
                    '</div>';
                document.getElementById('detailOutletModal').style.display = 'flex';
            }
        }

        function closeDetailOutlet() {
            document.getElementById('detailOutletModal').style.display = 'none';
        }

        function editOutlet(id) {
            alert('Edit outlet ' + id + ' - Coming soon!');
        }

        function logout() {
            localStorage.removeItem('lunomi_session');
            window.location.href = 'index.html';
        }

        function checkSession() {
            const s = localStorage.getItem('lunomi_session');
            if (!s) { window.location.href = 'index.html'; return; }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checkSession();
            render();
        });
    </script>
</body>
</html>
