<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunomi — Manajemen Shift</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="lunomi-core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>*{font-family:'Plus Jakarta Sans',sans-serif;}body{min-height:100vh;background:#020617;background-image:radial-gradient(ellipse 70% 50% at 10% 0%,rgba(99,102,241,.25) 0%,transparent 60%);color:white;overflow-x:hidden;}.glass-nav{background:rgba(2,6,23,.7);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);}.glass-card{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);}</style>
</head>
<body>
<nav class="glass-nav sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3">
        <button onclick="window.location.href='dashboard.html'" class="text-white opacity-50 hover:opacity-100 transition text-lg">←</button>
        <div class="w-8 h-8 rounded-xl flex items-center justify-center text-lg" style="background:linear-gradient(135deg,#6366f1,#4f46e5)">⏰</div>
        <div><div class="font-extrabold text-white text-sm">Manajemen Shift</div><div class="text-xs" id="outletLabel" style="color:rgba(255,255,255,.4)">Semua Outlet</div></div>
    </div>
</nav>
<div class="max-w-6xl mx-auto px-4 py-16 text-center">
    <div class="text-6xl mb-6">⏰</div>
    <h1 class="text-2xl font-extrabold text-white mb-2">Manajemen Shift</h1>
    <p class="mb-8 max-w-md mx-auto" style="color:rgba(255,255,255,.5)">Atur jadwal shift kasir dan karyawan secara fleksibel.</p>
    <div class="glass-card rounded-2xl p-6 max-w-sm mx-auto text-left">
        <p class="text-xs font-semibold uppercase tracking-widest mb-3" style="color:rgba(255,255,255,.35)">Fitur yang akan hadir</p>
        <ul class="space-y-2 text-sm" style="color:rgba(255,255,255,.6)"><li>✦ Buat jadwal shift mingguan</li><li>✦ Tukar shift antar karyawan</li><li>✦ Laporan kehadiran shift</li><li>✦ Notifikasi shift otomatis</li></ul>
    </div>
    <button onclick="window.location.href='dashboard.html'" class="mt-8 px-6 py-3 rounded-xl text-sm font-bold text-white" style="background:linear-gradient(135deg,#6366f1,#4f46e5)">← Kembali ke Dashboard</button>
</div>
<script>
document.addEventListener('DOMContentLoaded',()=>{
    try{const s=localStorage.getItem('lunomi_session');if(!s){window.location.href='index.html';return;}
    const o=JSON.parse(localStorage.getItem('lunomi_outlet')||'null');
    if(o)document.getElementById('outletLabel').textContent=o.name;}
    catch(e){window.location.href='index.html';}
});
</script>
</body>
</html>
